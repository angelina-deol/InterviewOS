services:
  - type: web
    name: interviewos-backend
    runtime: node
    plan: starter
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
      - key: GITHUB_TOKEN
        sync: false
      - key: AI_DAILY_LIMIT
        value: "20"
      - key: DB_PATH
        value: /var/data/interviewos.db
    disk:
      name: interviewos-data
      mountPath: /var/data
      sizeGB: 1